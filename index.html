<!DOCTYPE html>
<html>
<head>
    <title>Arithmetic Operation</title>
    <script>
        function calculate() {
            var n1 = parseInt(document.getElementById("t1").value);
            var n2 = parseInt(document.getElementById("t2").value);
            var op = document.getElementById("s1").value;
            var ans;

            if (op == "+")
                ans = n1 + n2;
            else if (op == "-")
                ans = n1 - n2;
            else if (op == "*")
                ans = n1 * n2;
            else if (op == "/")
                ans = n1 / n2;
            else if (op == "%")
                ans = n1 % n2;

            document.getElementById("result").innerHTML = "Answer is: " + ans;
        }
    </script>
</head>
<body bgcolor="cyan">
<center>
    <h2>Arithmetic Operation</h2>

    Number 1:
    <input type="text" id="t1"><br><br>

    Number 2:
    <input type="text" id="t2"><br><br>

    <select id="s1">
        <option value="+">+</option>
        <option value="-">-</option>
        <option value="*">*</option>
        <option value="/">/</option>
        <option value="%">%</option>
    </select>

    <br><br>

    <input type="button" value="Result" onclick="calculate()">

    <h3 id="result"></h3>
</center>
</body>
</html>
