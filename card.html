<!DOCTYPE html>
<html>
<head>
    <title>Best Wishes Card</title>
</head>
<body style="text-align:center; font-family:Arial; background:pink; margin-top:100px;">

<div style="background:white; width:400px; margin:auto; padding:20px; border-radius:15px;">
    <h1>❤️ Best Wishes ❤️</h1>

    <h2 id="username"></h2>

    <p>
        Wishing you endless love, happiness, and beautiful moments.
        May your life always be filled with smiles and joy.
        ❤️💖
    </p>

    <h3>With Love 💕</h3>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const name = params.get("name");
document.getElementById("username").innerHTML = "Dear " + name + ",";
</script>

</body>
</html>
